<!DOCTYPE html>
<html>
<head>
<style> 
div {
  width: 100px;
  height: 100px;
  background: red;
  position: relative;
  animation: mymove 5s ;
}

@keyframes mymove {
  from {top: 200px; left:0}
  to {top: 0px;left:200px}
}
</style>
</head>
<body>

<h1>O uso de regras @keyframes</h1>

<div>
  <img src="flu.svg">
</div>

</body>
</html>
